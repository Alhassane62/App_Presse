<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un article</title>
</head>
<body>

    <h1>Créer un article</h1>

    <form method="POST">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">
            Créer
        </button>
    </form>

    <a href="{% url 'list_article' %}">
        Retour à la liste
    </a>

</body>
</html>
